name: quran_ward_app
description: "A beautiful Quran and Prayer Times Flutter app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  geolocator: ^11.0.0
  adhan: ^2.1.1
  intl: ^0.19.0
  syncfusion_flutter_pdfviewer: ^24.2.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/quran.pdf
