name: Flutter Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create and Override Project
        run: |
          # إنشاء مشروع فلاتر نظيف تماماً ومتوافق بنسبة 100%
          flutter create --org com.ewais.ward --template=app quran_ward_app
          
          # مسح الملف الافتراضي وزرع كود واجهتك المباركة المصححة
          rm -f quran_ward_app/lib/main.dart
          cp lib/main.dart quran_ward_app/lib/main.dart

      - name: Build Final APK
        run: |
          cd quran_ward_app
          # أمر البناء المباشر والآمن لتخطي أي تعارضات في الحزم القديمة
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ward-Quran-v1
          path: quran_ward_app/build/app/outputs/flutter-apk/*.apk
