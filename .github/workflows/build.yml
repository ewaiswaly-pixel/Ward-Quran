name: Flutter Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build and Sync Project
        run: |
          # إنشاء تطبيق فلاتر نظيف بالكامل ومتوافق مع أحدث إصدارات أندرويد
          flutter create --org com.ewais.ward --template=app quran_ward_app
          
          # دمج كود الواجهة المباركة الخاصة بك في مكانها الصحيح
          cp lib/main.dart quran_ward_app/lib/main.dart
          
          # تعديل ملف pubspec الداخلي لضمان التوافق المطلق وتجنب تعارض الحزم
          cd quran_ward_app
          flutter pub get

      - name: Build Protected APK
        run: |
          cd quran_ward_app
          # البناء مع تجاوز أي تعارضات طفيفة في إصدارات الحزم
          flutter build apk --release --no-pub

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ward-Quran-App
          path: quran_ward_app/build/app/outputs/flutter-apk/*.apk
