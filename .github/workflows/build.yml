name: Flutter Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Safe Project Structure
        run: |
          # إنشاء مشروع فلاتر نظيف ورسمي في مجلد جانبي
          flutter create --org com.ewais.ward quran_app_fresh
          
          # استبدال ملفات الإعدادات والكود بملفاتك الأصلية الفاخرة مباشرة
          cp pubspec.yaml quran_app_fresh/pubspec.yaml
          cp lib/main.dart quran_app_fresh/lib/main.dart

      - name: Install Dependencies
        run: |
          cd quran_app_fresh
          flutter pub get

      - name: Build APK
        run: |
          cd quran_app_fresh
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: quran_app_fresh/build/app/outputs/flutter-apk/*.apk
