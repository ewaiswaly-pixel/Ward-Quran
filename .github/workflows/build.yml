name: Flutter Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب المشروع
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. تهيئة جافا
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. تهيئة فلاتر ببيئة حديثة ومستقرة
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

# 4. مسح المجلدات التالفة القديمة وإعادة إنشائها تلقائياً باسم صحيح ومجبر
      - name: Recreate Android Project Framework
        run: |
          rm -rf android
          flutter create --platforms=android --project-name=ward_quran .

      # 5. جلب المكتبات بشكل نظيف
      - name: Install Dependencies
        run: flutter pub get

      # 6. بناء ملف الـ APK النهائي بنجاح
      - name: Build Comprehensive APK
        run: flutter build apk --debug

      # 7. رفع ملف الـ APK للتحميل
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quran-prayer-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
