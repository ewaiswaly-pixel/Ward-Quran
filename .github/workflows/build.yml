name: Flutter Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Project and Inject Permissions
        run: |
          # 1. إنشاء التطبيق بالهوية الرسمية
          flutter create --org com.ewais.ward --template=app quran_ward_app
          
          # 2. الانتقال لداخل المشروع المؤقت
          cd quran_ward_app
          
          # 3. تثبيت كافة الحزم والمكتبات المطلوبة للكود الجديد لتجنب انهيار الـ Kernel
          flutter pub add adhan geolocator intl syncfusion_flutter_pdfviewer
          
          # 4. زراعة صلاحيات الـ GPS والأذان داخل ملف الأندرويد لعام 2026
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS='<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />'
          sed -i "s|<manifest[^>]*>|&\n    $PERMISSIONS|" $MANIFEST_PATH
          
          # 5. نقل كود الواجهة الرئيسي وتحديثه
          cd ..
          rm -f quran_ward_app/lib/main.dart
          cp lib/main.dart quran_ward_app/lib/main.dart

      - name: Build Comprehensive APK
        run: |
          cd quran_ward_app
          flutter build apk --debug --target-platform android-arm64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ward-Quran-App-Success
          path: quran_ward_app/build/app/outputs/flutter-apk/*.apk
